services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod # 本番用のファイルを指定
    # 👇 修正①: public/ に対する chown を削除（Docker内部だけの管轄になるため不要になります）
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails assets:clobber && bundle exec rails assets:precompile && chown -R 1000:1000 storage/ && bundle exec rails s -p 3000 -b '0.0.0.0' -e production"
    restart: always
    volumes:
      - /home/pi/practice-app/storage:/app/storage
      # 👇 修正②: ホストのパス指定をやめ、Dockerの名前付きボリュームに変更
      - public_assets:/app/public
    environment:
      # 左側がコンテナ内の変数名、右側が .env から読み込む変数名
      - TZ=Asia/Tokyo  # ログのためにUTCからJSTにする
      # ImageMagickのメモリ使用量を制限する（ラズパイのメモリ対策）
      - MAGICK_MEMORY_LIMIT=32MiB
      - MAGICK_MAP_LIMIT=64MiB
      - MAGICK_AREA_LIMIT=32MiB
      - MAGICK_DISK_LIMIT=256MiB
      - MAGICK_THREAD_LIMIT=1
      # jemallocチューニング設定
      - MALLOC_CONF=background_thread:true,metadata_thp:auto,dirty_decay_ms:1000,muzzy_decay_ms:1000,narenas:2
      - MALLOC_ARENA_MAX=2
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_LOG_LEVEL=warn
      - RAILS_SERVE_STATIC_FILES=true # これを有効にする
      - WEB_CONCURRENCY=0      # 👈 プロセス数を「シングル（0）」にしてメモリを劇的に節約
#     - RAILS_MAX_THREADS=5    # 👈 同時処理スレッド数を5程度に制限（ラズパイにはこれで十分）
      # キャッシュする画像数を0にする（メモリに保持しない）
      #- VIPS_CACHE_MAX=0
      # キャッシュメモリサイズを制限する（10MB程度に制限）
      #- VIPS_CACHE_MAX_MEM=10000000
      # GCを積極的に動かすための設定
      - RUBY_GC_HEAP_OLDOBJECT_LIMIT_FACTOR=1.2
      - RUBY_GC_MALLOC_LIMIT=4000000
      - RUBY_GC_MALLOC_LIMIT_MAX=16000000
      - ACTION_DISPATCH_DEFAULT_HOST=taninin.com  # 追加
    deploy:
      resources:
        limits:
          memory: 550M
    env_file:
      - .env
    logging:                  # 👈 ここから追記
      driver: "json-file"
      options:
        max-size: "10m"       # 1ファイル最大10MB
        max-file: "3"         # 過去3ファイルまで保持（古いものは自動削除）
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine # 軽量なAlpineベースを使用
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # 👇 修正③: webコンテナと同じ名前付きボリュームをマウントする
      - public_assets:/app/public:ro
    depends_on:
      web:                          # ← ここを修正
      condition: service_started  # ← 追加
    restart: always
    deploy:
      resources:
        limits:
          memory: 48M # 48MB程度あればNginxには十分すぎます

  tunnel:
    build: ./cloudflared
    image: cloudflare/cloudflared:latest
    # --no-autoupdate をつけてラズパイ上での不要なアップデート処理（CPU負荷）を防ぐ
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - nginx
    volumes:
    # ホストの .cloudflared フォルダをコンテナに渡す
      - /home/pi/.cloudflared:/home/nonroot/.cloudflared
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M # 通常はこれで足ります。APIの通信量が多い場合は128Mに増やしてもOK
    extra_hosts:
      - "host.docker.internal:host-gateway"
  db:
    image: yobasystems/alpine-mariadb
    restart: always
    command: --innodb-buffer-pool-size=64M --innodb-log-buffer-size=8M --max-connections=20 --innodb-temp-data-file-path=ibtmp1:12M:autoextend:max:32M
    environment:
      # .env ファイルの値を読み込んでMariaDBを初期化します
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      TZ: Asia/Tokyo
    healthcheck:
      # healthcheck.sh の代わりに標準の mysqladmin ping を使用する
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      # データベースの中身が消えないようにボリュームをマウントします
      - mariadb_data:/var/lib/mysql
volumes:
  mariadb_data:
  public_assets: # 👈 追加
