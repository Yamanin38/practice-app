upstream rails {
    server web:3000;
}

server {
    listen 80;
    server_name taninin.com;

    client_max_body_size 50M;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # ★修正ポイント: コンテナ内のマウント先パスに変更
    location /assets/ {
        alias /app/public/assets/; 
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ActiveStorage画像
    location /rails/active_storage/ {
        proxy_pass http://rails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Ssl on;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Railsアプリ本体
    location / {
        proxy_pass http://rails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 悪意のあるBotや不要ファイルの遮断設定（そのまま引き継ぎ）
    location = /sitemap.xml { 
        access_log off;
        log_not_found off;
        return 404;
    }
    location = /robots.txt  { 
        access_log off;
        log_not_found off;
        return 404;
    }
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* /(wp-admin|wp-includes|wp-login\.php|xmlrpc\.php) {
        access_log off; log_not_found off; return 444;
    }
    location ~* \.php$ {
        access_log off; log_not_found off; return 444;
    }
    location ~ /\. {
        access_log off; log_not_found off; deny all;
    }
    location ~* /(env|environment|environ_names) {
        return 444; access_log off; log_not_found off;
    }
}