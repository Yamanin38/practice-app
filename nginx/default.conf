upstream rails {
    server web:3000;
}

# 検索・絞り込みは負荷が高いため、より厳しく制限
limit_req_zone $binary_remote_addr zone=limit_req_filters:10m rate=2r/s;
# 通常アクセス用
limit_req_zone $binary_remote_addr zone=limit_req_general:10m rate=10r/s;

server {
    listen 80;
    server_name taninin.com;

    # ログにinfoレベルのものを書かないようにする
    error_log /var/log/nginx/error.log warn;

    client_max_body_size 50M;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # server ブロック内に追加
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # server ブロック内に追加
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1024;

    location ~* ^/(gallery|articles) {
        limit_req zone=limit_req_filters burst=5 nodelay;
        # Railsへ情報を正しく伝えるための設定（ここをコピー！）
        proxy_pass http://rails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ★修正ポイント: コンテナ内のマウント先パスに変更
    location /assets/ {
        alias /app/public/assets/; 
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ActiveStorage画像
    location /rails/active_storage/ {
        # burst=20: 一時的なアクセスのスパイク（画像の読み込み等）は20個まで許容する
        # nodelay: burstで許容した分は遅延させずにすぐにRailsへ送る
        limit_req zone=limit_req_general burst=20 nodelay;
        proxy_pass http://rails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Ssl on;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Railsアプリ本体
    location / {
        limit_req zone=limit_req_general burst=20 nodelay;
        proxy_pass http://rails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 悪意のあるBotや不要ファイルの遮断設定（そのまま引き継ぎ）
    location = /sitemap.xml { 
        access_log off;
    }
    location = /robots.txt  { 
        access_log off;
    }
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* /(wp-admin|wp-includes|wp-json|wp-content|wp-login\.php|xmlrpc\.php|install\.php|wp-config\.php) {
        access_log off;
        log_not_found off;
        return 444;
    }
    location ~* \.php$ {
        access_log off;
        log_not_found off;
        return 444;
    }
    location ~ /\. {
        access_log off;
        log_not_found off;
        return 444;
    }
    location ~* /(env|environment|environ_names) {
        access_log off;
        log_not_found off;
        return 444;
    }
    location ~ /\.env {
        access_log off;
        log_not_found off;
        return 444;
    }
    # バックアップファイルや圧縮ファイルのダウンロードを禁止
    location ~* \.(sql|bak|tar|gz|zip|bz2|7z|log)$ {
        access_log off;
        log_not_found off;
        return 444;
    }
}