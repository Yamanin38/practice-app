# 💡 Docker内での通信用に「127.0.0.1」から「web」に変更しています
upstream rails {
    server web:3000;
}

server {
    listen 80;
    server_name taninin.com;

    # 👇 これを追加！（50M = 50メガバイトまでアップロードを許可）
    client_max_body_size 50M;
    client_body_buffer_size 16k;    # 小さく設定
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # ★ポイント3: 静的アセットの有効化（Railsへの負荷を激減させます）
    location /assets/ {
        # 👇 【ここを修正！】ホストのパスではなく、コンテナ内のパスに変更します
        alias /app/public/assets/;
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ActiveStorage画像
    location /rails/active_storage/ {
        proxy_pass http://rails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # 👇 【重要】この1行を新しく追加してください！
       proxy_set_header X-Forwarded-Ssl on;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Railsアプリ本体
    location / {
        proxy_pass http://rails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 【ここを修正】変数をやめて、強制的に https を指定します
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_read_timeout 60s;
        # 必要に応じて追加：接続を維持してリソースを節約
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    # sitemap.xml, robots.txt などをNginxでスルー（前回の設定）
    location = /sitemap.xml 
      { access_log off;
        log_not_found off;
        return 404;
    }
    location = /robots.txt  { 
        access_log off;
        log_not_found off;
        return 404;
    }
    location = /favicon.ico { 
        access_log off;
        log_not_found off;
        return 404;
    }

    # 悪意のあるBot（WordPressやPHPへの無差別攻撃）を「無言で強制切断 (444)」
    location ~* /(wp-admin|wp-includes|wp-login\.php|xmlrpc\.php) {
        access_log off;
        log_not_found off;
        return 444;
    }

    # ついでに、Railsに存在しないはずの .php ファイルへのアクセスも全て強制切断
    location ~* \.php$ {
        access_log off;
        log_not_found off;
        return 444;
    }

    # 隠しファイル（.envや.gitなど）へのアクセスを拒否（前回の設定）
    location ~ /\. {
        access_log off;
        log_not_found off;
        deny all;
    }

    # ② ログに出てきた「env」「environment」「environ_names」を含むURLを大文字小文字問わず遮断
    location ~* /(env|environment|environ_names) {
        return 444;
        access_log off;
        log_not_found off;
    }
}