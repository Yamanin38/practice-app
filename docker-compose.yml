services:
  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      # 左側がコンテナ内の変数名、右側が .env から読み込む変数名
     - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
    deploy:
      resources:
        limits:
          memory: 400M
  db:
    image: mariadb:10.11
    restart: always
    command: --innodb-buffer-pool-size=64M --innodb-log-buffer-size=8M --max-connections=20
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 250M
    volumes:
      - mariadb_data:/var/lib/mysql
volumes:
  mariadb_data: