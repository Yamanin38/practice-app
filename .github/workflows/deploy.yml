name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - product2  # product2 ブランチにマージ（Push）されたら実行

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 最新コードのチェックアウト
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. GitHub Actions側に cloudflared をインストール（必須！）
      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # 3. SSHの設定、そしてrsync
      - name: Deploy via rsync over Cloudflare Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RASPI_SSH_KEY }}
        run: |
          # 1. 秘密鍵をGitHub Actionsのサーバー内にセット
          mkdir -p $HOME/.ssh
          echo "$SSH_PRIVATE_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 2. SSHの設定ファイル（config）を作成
          cat <<EOF > $HOME/.ssh/config
          Host yamapi
            HostName ssh-deploy.taninin.com
            User ${{ secrets.RASPI_USER_NAME }}
            StrictHostKeyChecking no
            BatchMode yes
            ConnectTimeout 10
            ServerAliveInterval 10
            ServerAliveCountMax 3
            # 【復活】通信をWebソケットに変換してCloudflareの壁を越える
            ProxyCommand cloudflared access ssh --hostname %h
          EOF
          chmod 600 $HOME/.ssh/config

          # 4. rsyncの実行（--deleteで同期しつつ、必要なファイルは除外して保護する）
          rsync -avz --progress --delete \
            --exclude='.git/' \
            --exclude='.git_backup/' \
            --exclude='.env' \
            --exclude='storage/' \
            --exclude='cloudflared.deb' \
            -e "ssh -F $HOME/.ssh/config" ./ yamapi:/home/pi/practice-app/