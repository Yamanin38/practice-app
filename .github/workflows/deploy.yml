name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - product2  # product2 ブランチにマージ（Push）されたら実行

jobs:
  deploy:
    runs-on: ubuntu-latest  # クラウド（GitHub側）のサーバーで実行 # test

    steps:
      # 1. 最新コードのチェックアウト
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. GitHub Actions側に cloudflared をインストール
      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # 3. SSHとCloudflare認証の設定、そしてrsync
      - name: Deploy via rsync over Cloudflare Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RASPI_SSH_KEY }}
          CF_CLIENT_ID: ${{ secrets.CFACCESSCLIENTID }}
          CF_CLIENT_SECRET: ${{ secrets.CFACCESSCLIENTSECRET }}
          RAPI_USER: ${{ secrets.RASPI_USER_NAME }}
        run: |
          # SSH鍵の設定
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # SSH接続時にCloudflareの認証トークンを自動で挟む設定
          # ホスト名はご自身のもの（ssh-deploy.yourdomain.comなど）に書き換えてください
          cat <<EOF > ~/.ssh/config
          Host yamapi
            HostName ssh-deploy.taninin.com
            ProxyCommand cloudflared access ssh --hostname %h --id "${{ secrets.CFACCESSCLIENTID }}" --secret "${{ secrets.CFACCESSCLIENTSECRET }}"
            User ${{ secrets.RASPI_USER_NAME }}
            StrictHostKeyChecking no
            # 追加：通信がなくても接続を維持し続ける設定
            ServerAliveInterval 60
            ServerAliveCountMax 3
            # 追加：接続開始の待ち時間を増やす
            ConnectTimeout 60
          EOF

          # .git を除外して、ラズパイの該当ディレクトリへファイルを同期
          # /path/to/your/app/ はラズパイ側の実際のパスに変えてください
          rsync -avz --delete --exclude='.git/' ./ ssh-deploy.taninin.com:/home/pi/practice-app/